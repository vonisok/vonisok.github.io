# Book library data source for /books/
#
# How to add a new book:
# - Put PDF files in: /assets/books/pdfs/
# - Put cover/first-page preview images in: /assets/books/covers/
# - Add one item below using this shape:
#
# - title: "Book Title"
#   author: "Author Name"
#   category: "Category Name"
#   cover_image: "/assets/books/covers/book-title.jpg"
#   pdf_url: "/assets/books/pdfs/book-title.pdf"   # optional
#   source_url: "https://example.com"              # optional (for non-local file links)
#   description: "Short summary"                    # optional
#   year: 2024                                       # optional
#   tags: [mindset, strategy]                        # optional

