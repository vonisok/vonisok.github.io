# Book library data source for /books/
#
# How to add a new book:
# - Put PDF files in: /assets/books/pdfs/
# - Put cover/first-page preview images in: /assets/books/covers/
# - Add one item below using this shape:
#
# - title: "Book Title"
#   author: "Author Name"
#   category: "History"                            # top-level group (e.g., Drugs, Politics, History)
#   subcategory: "WW2"                             # narrower grouping (e.g., Cocaine, Weed, Manifestos)
#   cover_image: "/assets/books/covers/book.jpg"
#   pdf_url: "/assets/books/pdfs/book.pdf"         # optional
#   source_url: "https://example.com/book"         # optional
#   year: 2024                                       # optional

